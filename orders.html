<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan | Toko Kue Mandasari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mandasari-navy': '#0A192F',
                        'mandasari-gold': '#C5A059',
                        'mandasari-cream': '#F9F6F0',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-mandasari-cream text-mandasari-navy font-sans antialiased min-h-screen flex flex-col">

    <nav class="w-full py-5 px-6 md:px-12 border-b border-mandasari-gold/20 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-serif text-2xl font-black tracking-tight flex items-center gap-2">
                Mandasari <span class="text-mandasari-gold">Kue.</span>
            </a>
            <div class="flex items-center space-x-6">
                 <a href="products.html" class="text-sm font-semibold hover:text-mandasari-gold transition-colors hidden md:block">Lanjut Belanja</a>
                 <a href="cart.html" class="relative hover:text-mandasari-gold transition-colors">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                 </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-12 px-6 lg:px-12 max-w-5xl mx-auto w-full">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10">
            <div>
                <h1 class="font-serif text-4xl font-bold tracking-tight mb-2">Riwayat Pesanan</h1>
                <p class="text-slate-500">Pantau status kelezatan yang sedang menuju ke tempatmu.</p>
            </div>
            <div class="h-1 w-20 bg-mandasari-gold rounded-full"></div>
        </div>

        <div id="orders-container" class="space-y-8">
            <div class="flex justify-center py-20">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-mandasari-gold"></i>
            </div>
        </div>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/app.js"></script>

    <script>
        lucide.createIcons();

        // Cek login sebelum menampilkan data
        Auth.requireLogin(async () => {
            const container = document.getElementById('orders-container');
            const orders = await Orders.getUserOrders();

            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-mandasari-gold/20 rounded-[2rem] p-16 text-center shadow-sm">
                        <div class="w-20 h-20 bg-mandasari-cream rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="package-open" class="w-10 h-10 text-mandasari-gold"></i>
                        </div>
                        <h3 class="text-2xl font-serif font-bold mb-3">Belum ada pesanan</h3>
                        <p class="text-slate-500 mb-8 max-w-xs mx-auto">Sepertinya kamu belum mencicipi koleksi kue spesial kami hari ini.</p>
                        <a href="products.html" class="inline-flex bg-mandasari-navy text-white font-bold px-8 py-4 rounded-xl hover:bg-slate-800 transition-all shadow-lg shadow-mandasari-navy/20">
                            Mulai Belanja
                        </a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = [...orders].map(order => {
                // Label Status
                let statusBadge = '';
                switch(order.status) {
                    case 'Processing': statusBadge = '<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Diproses</span>'; break;
                    case 'Shipped': statusBadge = '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Dikirim</span>'; break;
                    case 'Delivered': statusBadge = '<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Selesai</span>'; break;
                    default: statusBadge = `<span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">${order.status}</span>`;
                }

                return `
                    <div class="bg-white border border-mandasari-gold/10 rounded-[2rem] overflow-hidden shadow-sm hover:shadow-md transition-shadow group">
                        <div class="p-6 md:p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between md:items-center gap-6 bg-slate-50/30">
                            <div>
                                <div class="flex items-center gap-4 mb-2">
                                    <span class="font-mono font-bold text-mandasari-navy">#${order.id}</span>
                                    ${statusBadge}
                                </div>
                                <div class="text-sm text-slate-500 flex flex-wrap items-center gap-y-2 gap-x-6">
                                    <span class="flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4 text-mandasari-gold"></i> ${App.formatDate(order.date)}</span>
                                    <span class="flex items-center gap-2"><i data-lucide="wallet" class="w-4 h-4 text-mandasari-gold"></i> ${order.paymentMethod || 'Transfer Bank'}</span>
                                </div>
                            </div>
                            <div class="md:text-right border-t md:border-t-0 pt-4 md:pt-0">
                                <div class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Total Pembayaran</div>
                                <div class="font-serif text-2xl font-bold text-mandasari-navy">${Cart.formatCurrency(order.total)}</div>
                            </div>
                        </div>

                        <div class="p-6 md:p-8">
                            <div class="divide-y divide-slate-100">
                                ${order.items.map(item => `
                                    <div class="py-4 first:pt-0 last:pb-0 flex items-center gap-5">
                                        <div class="w-20 h-20 bg-mandasari-cream rounded-2xl overflow-hidden flex-none border border-mandasari-gold/5">
                                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                        </div>
                                        <div class="flex-grow min-w-0">
                                            <h4 class="font-bold text-mandasari-navy truncate">${item.name}</h4>
                                            <div class="text-sm text-slate-500 mt-1">${item.quantity} × ${Cart.formatCurrency(item.price)}</div>
                                            
                                            ${order.status === 'Delivered' ? `
                                            <div class="mt-3 flex items-center gap-3">
                                                <span class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Beri Nilai:</span>
                                                <div class="flex gap-1">
                                                    ${[1, 2, 3, 4, 5].map(star => `
                                                        <button onclick="rateProduct('${order.id}', ${item.id}, ${star})" class="transition-all hover:scale-125 ${item.rating >= star ? 'text-mandasari-gold' : 'text-slate-200'}">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                                        </button>
                                                    `).join('')}
                                                </div>
                                            </div>
                                            ` : ''}
                                        </div>
                                        <div class="font-bold text-mandasari-navy hidden sm:block">
                                            ${Cart.formatCurrency(item.price * item.quantity)}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        });

        // Fungsi Rating
        window.rateProduct = async function(orderId, productId, rating) {
            const success = await Orders.rateProduct(orderId, productId, rating);
            if (success) {
                if (typeof Toast !== 'undefined') Toast.show('Terima kasih atas ulasannya!', 'success');
                setTimeout(() => window.location.reload(), 800);
            } else {
                if (typeof Toast !== 'undefined') Toast.show('Gagal memberikan rating.', 'error');
            }
        };;
    </script>
</body>
</html>
